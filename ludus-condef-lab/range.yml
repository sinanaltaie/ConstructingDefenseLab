ludus:
  - vm_name: "{{ range_id }}-DC"
    hostname: "{{ range_id }}-DC"
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 11
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
    domain:
      fqdn: condef.local
      role: primary-dc
    roles:
      - role_gpo_deploy
      - role_cs_falcon_windows
    role_vars:
      cs_falcon_cid: "{{ lookup('env', 'CS_CID') }}"
      cs_falcon_api_client_id: "{{ lookup('env', 'CS_API_CLIENT_ID') }}"
      cs_falcon_api_client_secret: "{{ lookup('env', 'CS_API_CLIENT_SECRET') }}"
    testing:
      snapshot: true
      block_internet: false  # Falcon Sensor requires persistent outbound to CrowdStrike cloud

  - vm_name: "{{ range_id }}-CERTER"
    hostname: "{{ range_id }}-CERTER"
    template: win2022-server-x64-template
    vlan: 10
    ip_last_octet: 12
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: true
      install_additional_tools: false
      chocolatey_ignore_checksums: false
      chocolatey_packages:
        - notepadplusplus
    domain:
      fqdn: condef.local
      role: member
    roles:
      - badsectorlabs.ludus_adcs
      - role_cs_falcon_windows
    role_vars:
      ludus_adcs_domain: condef.local
      ludus_adcs_ca_host: CERTER
      ludus_adcs_domain_username: "condef.local\\Administrator"
      ludus_adcs_domain_password: 'Temp1234!!'
      ludus_adcs_ca_common_name: certer-CA
      ludus_adcs_esc1: true
      ludus_adcs_esc2: false
      ludus_adcs_esc3: false
      ludus_adcs_esc3_cra: false
      ludus_adcs_esc4: false
      ludus_adcs_esc6: false
      ludus_adcs_esc8: false
      ludus_adcs_esc13: false
      ludus_adcs_esc5: false
      ludus_adcs_esc7: false
      ludus_adcs_esc9: false
      ludus_adcs_esc11: false
      ludus_adcs_esc15: false
      ludus_adcs_esc16: false
      cs_falcon_cid: "{{ lookup('env', 'CS_CID') }}"
      cs_falcon_api_client_id: "{{ lookup('env', 'CS_API_CLIENT_ID') }}"
      cs_falcon_api_client_secret: "{{ lookup('env', 'CS_API_CLIENT_SECRET') }}"

  - vm_name: "{{ range_id }}-WIN11V"
    hostname: "{{ range_id }}-WIN11V"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 13
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
      install_additional_tools: false
      chocolatey_ignore_checksums: false
      chocolatey_packages:
        - notepadplusplus,7zip
    domain:
      fqdn: condef.local
      role: member
    roles:
      - role_cs_falcon_windows
    role_vars:
      cs_falcon_cid: "{{ lookup('env', 'CS_CID') }}"
      cs_falcon_api_client_id: "{{ lookup('env', 'CS_API_CLIENT_ID') }}"
      cs_falcon_api_client_secret: "{{ lookup('env', 'CS_API_CLIENT_SECRET') }}"

  - vm_name: "{{ range_id }}-WIN11A"
    hostname: "{{ range_id }}-WIN11A"
    template: win11-22h2-x64-enterprise-template
    vlan: 10
    ip_last_octet: 14
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
      install_additional_tools: false
      chocolatey_ignore_checksums: false
      chocolatey_packages:
        - notepadplusplus,7zip
    domain:
      fqdn: condef.local
      role: member
    roles:
      - role_cs_falcon_windows
    role_vars:
      cs_falcon_cid: "{{ lookup('env', 'CS_CID') }}"
      cs_falcon_api_client_id: "{{ lookup('env', 'CS_API_CLIENT_ID') }}"
      cs_falcon_api_client_secret: "{{ lookup('env', 'CS_API_CLIENT_SECRET') }}"

  - vm_name: "{{ range_id }}-linuxa"
    hostname: "{{ range_id }}-linuxa"
    template: debian-12-x64-server-template
    vlan: 10
    ip_last_octet: 15
    ram_gb: 8
    cpus: 4
    linux:
      packages:
        - ca-certificates
        - curl
        - git
        - make
    roles:
      - role_cs_falcon_linux
    role_vars:
      cs_falcon_cid: "{{ lookup('env', 'CS_CID') }}"
      cs_falcon_api_client_id: "{{ lookup('env', 'CS_API_CLIENT_ID') }}"
      cs_falcon_api_client_secret: "{{ lookup('env', 'CS_API_CLIENT_SECRET') }}"

  - vm_name: "{{ range_id }}-linuxv"
    hostname: "{{ range_id }}-linuxv"
    template: debian-12-x64-server-template
    vlan: 10
    ip_last_octet: 16
    ram_gb: 16
    cpus: 6
    linux: true
    roles:
      - role_minikube
      - role_cs_falcon_linux
    role_vars:
      cs_falcon_cid: "{{ lookup('env', 'CS_CID') }}"
      cs_falcon_api_client_id: "{{ lookup('env', 'CS_API_CLIENT_ID') }}"
      cs_falcon_api_client_secret: "{{ lookup('env', 'CS_API_CLIENT_SECRET') }}"

  - vm_name: "{{ range_id }}-pcap"
    hostname: "{{ range_id }}-pcap"
    template: debian-12-x64-server-template
    vlan: 10
    ip_last_octet: 17
    ram_gb: 32
    cpus: 6
    linux: true
    roles:
      - role_malcolm_install

router:
  vm_name: "{{ range_id }}-router"

network:
  inter_vlan_default: ACCEPT
  external_default: ACCEPT

defaults:
  snapshot_with_RAM: true
  stale_hours: 0
  ad_domain_functional_level: Win2012R2
  ad_forest_functional_level: Win2012R2
  ad_domain_admin: Administrator
  ad_domain_admin_password: 'Temp1234!!'
  ad_domain_user: condef
  ad_domain_user_password: 'Temp1234!!'
  ad_domain_safe_mode_password: 'Temp1234!!'
  timezone: America/New_York
  enable_dynamic_wallpaper: true
